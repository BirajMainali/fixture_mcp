<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows · Fixture</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <img src="/favicon.svg" alt="" class="logo">
      <a class="back" href="/">&larr; Dashboard</a>
      <h1>Workflows</h1>
    </div>
  </header>

  <div class="filter-bar">
    <input class="filter-input" id="filter" type="text" placeholder="Filter by slug or description..." oninput="applyFilter()" />
    <span class="count" id="count"></span>
  </div>

  <div class="table-wrap" id="workflows"><div class="empty">Loading...</div></div>
</div>

<script>
let data = [];

async function load() {
  data = await fetch("/api/workflows").then(r => r.json());
  render();
}

function applyFilter() {
  render();
}

function render() {
  const q = document.getElementById("filter").value.toLowerCase();
  const filtered = q ? data.filter(w =>
    w.slug.toLowerCase().includes(q) ||
    (w.description && w.description.toLowerCase().includes(q))
  ) : data;

  document.getElementById("count").textContent = `${filtered.length} of ${data.length}`;

  document.getElementById("workflows").innerHTML = filtered.length
    ? `<table><thead><tr><th>Slug</th><th>Description</th><th>Steps</th><th></th></tr></thead><tbody>${
        filtered.map(w => {
          const steps = JSON.parse(w.steps);
          return `<tr><td class="slug"><a href="/workflow.html?slug=${encodeURIComponent(w.slug)}">${w.slug}</a></td><td>${esc(w.description ?? "")}</td><td style="color:var(--text-muted);font-size:0.8rem;">${steps.length} steps</td><td><a class="run-link" href="/workflow.html?slug=${encodeURIComponent(w.slug)}">Run &rarr;</a></td></tr>`;
        }).join("")
      }</tbody></table>`
    : `<div class="empty">No workflows match your filter.</div>`;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function fmt(ts) { return new Date(ts).toLocaleString(); }
load();
</script>
</body>
</html>
